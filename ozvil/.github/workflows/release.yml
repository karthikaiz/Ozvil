name: Ozvil Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"        # v0.1.0, v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-beta*"  # v0.1.0-beta.1
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0)"
        required: true
        type: string
      publish_release:
        description: "Publish as GitHub Release"
        required: false
        default: "false"
        type: boolean

# ─── Permissions ─────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to create GitHub Releases and upload assets

# ─── Required secrets ────────────────────────────────────────────────────────
# TAURI_SIGNING_PRIVATE_KEY          — output of: cargo tauri signer generate
# TAURI_SIGNING_PRIVATE_KEY_PASSWORD — password chosen during key generation
# WINDOWS_CERTIFICATE                — base64-encoded .pfx code-signing certificate
# WINDOWS_CERTIFICATE_PASSWORD       — password for the .pfx certificate

jobs:
  build-windows:
    name: Build & Sign — Windows x64
    runs-on: windows-latest

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Rust toolchain ───────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ozvil/src-tauri -> target

      # ── Node + pnpm ──────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('ozvil/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install JS dependencies
        working-directory: ozvil
        run: pnpm install --frozen-lockfile

      # ── TypeScript check ──────────────────────────────────────────────────────
      - name: TypeScript typecheck
        working-directory: ozvil
        run: pnpm tsc --noEmit

      # ── Rust tests (mock adapter — no OS calls) ──────────────────────────────
      - name: Rust unit tests
        working-directory: ozvil
        run: cargo test --manifest-path src-tauri/Cargo.toml --all

      # ── Code signing certificate setup ───────────────────────────────────────
      - name: Import code-signing certificate
        if: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
        shell: pwsh
        run: |
          $certBase64 = "${{ secrets.WINDOWS_CERTIFICATE }}"
          $certBytes  = [System.Convert]::FromBase64String($certBase64)
          $certPath   = "$env:RUNNER_TEMP\ozvil-cert.pfx"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          $securePass = ConvertTo-SecureString "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}" -AsPlainText -Force
          Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePass | Out-Null
          $thumb = (Get-PfxCertificate -FilePath $certPath -Password $securePass).Thumbprint
          echo "OZVIL_CERT_THUMBPRINT=$thumb" >> $env:GITHUB_ENV
          Remove-Item $certPath -Force

      # ── Tauri build (NSIS + MSI) ──────────────────────────────────────────────
      - name: Build Tauri app
        working-directory: ozvil
        env:
          TAURI_ENV_PLATFORM: windows
          # If thumbprint was set above, Tauri/signtool will use it automatically
          # via the certificateThumbprint field in tauri.conf.json at build time.
        run: |
          # Inject the thumbprint at build time when certificate is available
          if ($env:OZVIL_CERT_THUMBPRINT) {
            $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
            $conf.bundle.windows.certificateThumbprint = $env:OZVIL_CERT_THUMBPRINT
            $conf.bundle.windows.timestampUrl = "http://timestamp.digicert.com"
            $conf | ConvertTo-Json -Depth 20 | Set-Content src-tauri/tauri.conf.json
          }
          pnpm tauri build --target x86_64-pc-windows-msvc --bundles nsis,msi
        shell: pwsh

      # ── Verify Safe Mode shortcut is present ──────────────────────────────────
      - name: Verify NSIS installer contains Safe Mode shortcut
        working-directory: ozvil
        shell: pwsh
        run: |
          # Quick static check: the compiled NSIS script must reference Safe Mode
          $nsiContent = Get-Content src-tauri/nsis/installer.nsi -Raw
          if ($nsiContent -notmatch "Safe Mode") {
            Write-Error "NSIS installer does not contain Safe Mode shortcut definition"
            exit 1
          }
          Write-Host "Safe Mode shortcut definition confirmed in NSIS script." -ForegroundColor Green

      # ── Collect artifacts ─────────────────────────────────────────────────────
      - name: List build artifacts
        working-directory: ozvil
        shell: pwsh
        run: |
          $bundleDir = "src-tauri\target\release\bundle"
          Get-ChildItem "$bundleDir\nsis\*.exe", "$bundleDir\msi\*.msi" -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "$($_.Name) — $([math]::Round($_.Length/1MB,1)) MB" }

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: ozvil-nsis-x64
          path: ozvil/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: ozvil-msi-x64
          path: ozvil/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

      - name: Upload updater artifacts (signed .sig files)
        uses: actions/upload-artifact@v4
        with:
          name: ozvil-updater-sigs
          path: |
            ozvil/src-tauri/target/release/bundle/nsis/*.sig
            ozvil/src-tauri/target/release/bundle/msi/*.sig
          retention-days: 30

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.version }}
          name: Ozvil ${{ github.ref_name || inputs.version }}
          draft: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            ozvil/src-tauri/target/release/bundle/nsis/*.exe
            ozvil/src-tauri/target/release/bundle/msi/*.msi
            ozvil/src-tauri/target/release/bundle/nsis/*.sig
            ozvil/src-tauri/target/release/bundle/msi/*.sig
          body: |
            ## Ozvil ${{ github.ref_name || inputs.version }}

            ### Installation
            - **Recommended**: Download the `.exe` (NSIS installer) — easier install/uninstall
            - **MSI**: For IT/enterprise deployment via Group Policy

            ### Safe Mode
            After installing, you'll find two Start Menu shortcuts:
            - **Ozvil** — normal launch
            - **Ozvil (Safe Mode)** — launches with automation fully disabled

            Use Safe Mode if a profile or script is causing problems on startup.

            ### What changed
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
