name: Ozvil CI

on:
  push:
    branches: [main, develop]
    paths:
      - "ozvil/**"
  pull_request:
    branches: [main]
    paths:
      - "ozvil/**"

jobs:
  check:
    name: Typecheck + Rust tests
    # Use Windows so Windows-specific code paths compile correctly
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ozvil/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install JS dependencies
        working-directory: ozvil
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        working-directory: ozvil
        run: pnpm tsc --noEmit

      - name: Rust fmt check
        working-directory: ozvil
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Rust clippy
        working-directory: ozvil
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all -- -D warnings

      - name: Rust unit tests
        working-directory: ozvil
        run: cargo test --manifest-path src-tauri/Cargo.toml --all
